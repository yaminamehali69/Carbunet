name: Mise a jour Automatique CarbuNet

on:
  schedule:
    - cron: '0 7,16 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Force l'autorisation d'écriture
    steps:
      - name: Recupere le code
        uses: actions/checkout@v3

      - name: Installe Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installe les outils
        run: pip install pandas sqlalchemy pymysql GitPython cryptography openpyxl

      - name: Execute le nettoyage
        run: python maj_auto.py

      - name: Envoi sur GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add carburant_prix_nettoye.csv
          git commit -m "MàJ auto Cloud" || exit 0
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force